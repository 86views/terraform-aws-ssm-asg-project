name: Terraform CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'env/dev/**'
      - 'modules/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'env/dev/**'
      - 'modules/**'

env:
  TF_VERSION: 1.6.0
  WORKING_DIR: ./env/dev
  TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
  TF_VAR_environment: "dev"
  TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
  TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        # Setting wrapper to false prevents the "Exit Code 3" issue 
        # when changes are detected in the plan.
        terraform_wrapper: false 

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Terraform Format
      # Changed to root level check to ensure both modules and env are clean
      run: terraform fmt -check -recursive
      # No working-directory here; run from root

    - name: Terraform Init
      run: terraform init -backend-config=backend.conf
      working-directory: ${{ env.WORKING_DIR }}

    - name: Terraform Validate
      run: terraform validate
      working-directory: ${{ env.WORKING_DIR }}

    - name: Terraform Plan
      id: plan
      run: terraform plan -input=false -out=tfplan
      working-directory: ${{ env.WORKING_DIR }}

    - name: Terraform Apply
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve tfplan
      working-directory: ${{ env.WORKING_DIR }}