name: Terraform CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'env/dev/**'
      - 'modules/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'env/dev/**'
      - 'modules/**'

env:
  TF_VERSION: 1.9.8
  WORKING_DIR: ./env/dev
  # Mapping existing secrets
  TF_VAR_project_name: ${{ secrets.PROJECT_NAME }}
  TF_VAR_environment: "dev"
  TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
  TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
  
  # Adding the missing variables that caused the error
  TF_VAR_aws_region: "us-east-1"
  TF_VAR_vpc_cidr: "10.0.0.0/16"
  TF_VAR_public_subnet_cidrs: '["10.0.1.0/24", "10.0.2.0/24"]'
  TF_VAR_private_subnet_cidrs: '["10.0.3.0/24", "10.0.4.0/24"]'
  TF_VAR_availability_zones: '["us-east-1a", "us-east-1b"]'
  TF_VAR_github_repo: "86views/terraform-aws-ssm-asg-project/actions"

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC
      contents: read  # Required for Checkout
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false 

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 1. Formatting Check (Ensures clean code)
    - name: Terraform Format
      run: terraform fmt -check -recursive

    # 2. Initialization with Provider Upgrade (Fixes "Key Expired" error)
    - name: Terraform Init
      run: terraform init -upgrade -backend-config=backend.conf
      working-directory: ${{ env.WORKING_DIR }}

    # 3. Static Security Analysis (Modern 2026 Best Practice)
    - name: Test with Checkov
      id: checkov
      uses: bridgecrewio/checkov-action@master
      with:
        directory: ${{ env.WORKING_DIR }}
        framework: terraform
        soft_fail: true # Set to false if you want the pipeline to stop on security flaws

    - name: Terraform Validate
      run: terraform validate
      working-directory: ${{ env.WORKING_DIR }}

    # 4. Plan with detailed output
    - name: Terraform Plan
      id: plan
      run: terraform plan -input=false -out=tfplan
      working-directory: ${{ env.WORKING_DIR }}

    # 5. Apply (Only on push to main)
    - name: Terraform Apply
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: terraform apply -auto-approve tfplan
      working-directory: ${{ env.WORKING_DIR }}